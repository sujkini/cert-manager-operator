apiVersion: apps/v1
kind: Deployment
metadata:
  name: trust-manager
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: trust-manager
    app.kubernetes.io/instance: trust-manager
    app.kubernetes.io/version: v0.16.0
    app.kubernetes.io/managed-by: cert-manager-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trust-manager
  template:
    metadata:
      labels:
        app: trust-manager
        app.kubernetes.io/name: trust-manager
        app.kubernetes.io/instance: trust-manager
        app.kubernetes.io/version: v0.16.0
    spec:
      serviceAccountName: trust-manager
      automountServiceAccountToken: true
      initContainers:
        - name: cert-manager-package-debian
          image: quay.io/jetstack/trust-pkg-debian-bookworm:20230311.0
          imagePullPolicy: IfNotPresent
          args:
            - /copyandmaybepause
            - /debian-package
            - /packages
          volumeMounts:
            - mountPath: /packages
              name: packages
              readOnly: false
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: trust-manager
          image: quay.io/jetstack/trust-manager:v0.16.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6443
              name: webhook
            - containerPort: 9402
              name: metrics
          readinessProbe:
            httpGet:
              port: 6060
              path: /readyz
            initialDelaySeconds: 3
            periodSeconds: 7
          args:
            - --log-format=text
            - --log-level=1
            - --metrics-port=9402
            - --readiness-probe-port=6060
            - --readiness-probe-path=/readyz
            - --leader-election-lease-duration=15s
            - --leader-election-renew-deadline=10s
            - --trust-namespace=cert-manager
            - --webhook-host=0.0.0.0
            - --webhook-port=6443
            - --webhook-certificate-dir=/tls
            - --default-package-location=/packages/cert-manager-package-debian.json
          volumeMounts:
            - mountPath: /tls
              name: tls
              readOnly: true
            - mountPath: /packages
              name: packages
              readOnly: true
          resources: {}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      nodeSelector:
        kubernetes.io/os: linux
      volumes:
        - name: packages
          emptyDir:
            sizeLimit: 50M
        - name: tls
          secret:
            defaultMode: 420
            secretName: trust-manager-tls
