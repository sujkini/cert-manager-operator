---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.15.0
  labels:
    app.kubernetes.io/name: trust-manager
    app.kubernetes.io/part-of: cert-manager-operator
  name: trustmanagers.operator.openshift.io
spec:
  group: operator.openshift.io
  names:
    categories:
    - cert-manager-operator
    - trust-manager
    - trustmanager
    kind: TrustManager
    listKind: TrustManagerList
    plural: trustmanagers
    singular: trustmanager
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].message
      name: Message
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          TrustManager describes the configuration and information about the managed trust-manager operand.
          The name must be `cluster` to make TrustManager a cluster singleton.

          When TrustManager is enabled on a Tech Preview cluster, trust-manager is deployed as an operand
          managed by cert-manager-operator.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec is the specification of the desired behavior of the
              TrustManager.
            properties:
              controllerConfig:
                description: controllerConfig configures labels and annotations applied
                  to resources created by the controller.
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: annotations to apply to resources created for the
                      trust-manager deployment.
                    maxProperties: 20
                    type: object
                    x-kubernetes-map-type: granular
                  labels:
                    additionalProperties:
                      type: string
                    description: labels to apply to resources created for the trust-manager
                      deployment.
                    maxProperties: 20
                    type: object
                    x-kubernetes-map-type: granular
                type: object
              filterExpiredCertificates:
                description: filterExpiredCertificates configures whether expired
                  certificates are removed from synthesized bundles.
                properties:
                  enabled:
                    default: false
                    description: enabled indicates whether expired certificates are
                      filtered from bundles.
                    type: boolean
                type: object
              logFormat:
                default: text
                description: logFormat specifies the output format for trust-manager
                  logging.
                enum:
                - text
                - json
                type: string
              logLevel:
                default: 1
                description: logLevel supports a value range as per Kubernetes logging
                  guidelines.
                format: int32
                maximum: 5
                minimum: 1
                type: integer
              managementState:
                default: Disabled
                description: managementState indicates whether the trust-manager operand
                  is enabled.
                enum:
                - Enabled
                - Disabled
                type: string
              secretTargets:
                description: secretTargets configures whether trust-manager may use
                  Secrets as bundle sources or targets.
                properties:
                  authorizedSecrets:
                    description: authorizedSecrets is the allow-list of secret names
                      trust-manager may read and write across namespaces.
                    items:
                      type: string
                    maxItems: 100
                    type: array
                    x-kubernetes-list-type: atomic
                  authorizedSecretsAll:
                    default: false
                    description: authorizedSecretsAll grants read/write permission
                      to all secrets across the cluster when enabled is true.
                    type: boolean
                  enabled:
                    default: false
                    description: enabled indicates whether secret targets are permitted.
                    type: boolean
                type: object
              trustNamespace:
                default: cert-manager
                description: |-
                  trustNamespace is the namespace used as the trust source for trust-manager.
                  The namespace must exist before trust-manager can reach Ready status.
                maxLength: 63
                minLength: 1
                type: string
            type: object
          status:
            description: status is the most recently observed status of the TrustManager.
            properties:
              conditions:
                description: conditions holds information about the current state
                  of the istio-csr agent deployment.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: observedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              trustManagerImage:
                description: trustManagerImage is the operand image reference observed
                  during reconciliation.
                type: string
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: trustmanager is a singleton, .metadata.name must be 'cluster'
          rule: self.metadata.name == 'cluster'
    served: true
    storage: true
    subresources:
      status: {}
